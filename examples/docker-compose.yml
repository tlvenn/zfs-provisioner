services:
  zfs-provisioner:
    image: ghcr.io/tlvenn/zfs-provisioner:latest
    privileged: true
    volumes:
      - /dev/zfs:/dev/zfs
    environment:
      ZFS_CONFIG: |
        parent: "tank/docker/stacks/myapp"
        defaults:
          compression: "zstd"
        datasets:
          # Empty form: no custom properties
          redis: {}
          # Simple form: single volume with properties
          cache:
            quota: "5G"
          # Nested form: multiple volumes per service
          postgres:
            data:
              quota: "50G"
              recordsize: "16K"
            wal:
              quota: "10G"
          app:
            config:
              quota: "1G"
            data:
              quota: "100G"
            logs:
              quota: "20G"
              compression: "lz4"

  redis:
    image: redis:7
    depends_on:
      zfs-provisioner:
        condition: service_completed_successfully
    volumes:
      - /tank/docker/stacks/myapp/redis:/data

  postgres:
    image: postgres:16
    depends_on:
      zfs-provisioner:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - /tank/docker/stacks/myapp/postgres/data:/var/lib/postgresql/data
      - /tank/docker/stacks/myapp/postgres/wal:/var/lib/postgresql/wal

  app:
    image: nginx:alpine
    depends_on:
      zfs-provisioner:
        condition: service_completed_successfully
    volumes:
      - /tank/docker/stacks/myapp/app/config:/app/config
      - /tank/docker/stacks/myapp/app/data:/app/data
      - /tank/docker/stacks/myapp/app/logs:/app/logs
